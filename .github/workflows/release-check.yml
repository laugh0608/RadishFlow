name: Release Checks

on:
  push:
    tags:
      - 'v*-dev'
      - 'v*-test'
      - 'v*-release'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check repository hygiene
        run: ./scripts/check-text-files.sh

  rust-baseline:
    name: Rust Baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run rust baseline
        run: ./scripts/check-repo.sh --skip-text-files

  rust-baseline-windows:
    name: Rust Baseline (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run rust baseline
        shell: pwsh
        run: ./scripts/check-repo.ps1 -SkipTextFiles
